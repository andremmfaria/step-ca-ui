services:

  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      TZ: "${TZ:-UTC}"
      POSTGRES_DB:       stepui
      POSTGRES_USER:     stepui
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stepui_secret}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - step-net
    privileged: true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stepui -d stepui"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── Step-CA ───────────────────────────────────────────────────────────────
  step-ca:
    image: smallstep/step-ca:latest
    container_name: step-ca
    privileged: true
    restart: unless-stopped
    ports:
      - "9443:9443"
    volumes:
      - step-ca-data:/home/step
      - ./step-ca-bootstrap.sh:/usr/local/bin/step-ca-bootstrap.sh:ro
    environment:
      TZ: "${TZ:-UTC}"
      DOCKER_STEPCA_INIT_NAME:             "Home CA"
      DOCKER_STEPCA_INIT_DNS_NAMES:        "step-ca,${HOST_IP:-127.0.0.1}"
      DOCKER_STEPCA_INIT_ADDRESS:          ":9443"
      DOCKER_STEPCA_INIT_PROVISIONER_NAME: "${PROVISIONER:-admin}"
      DOCKER_STEPCA_INIT_PASSWORD:         "${CA_PASSWORD:-change-me-min-8-chars}"
      DOCKER_STEPCA_INIT_SSH:              "false"
      STEPCA_DEFAULT_TLS_CERT_DURATION:    "${STEPCA_DEFAULT_TLS_CERT_DURATION:-8760h}"
      STEPCA_MAX_TLS_CERT_DURATION:        "${STEPCA_MAX_TLS_CERT_DURATION:-87600h}"
    command: ["/bin/sh", "/usr/local/bin/step-ca-bootstrap.sh", "/usr/local/bin/step-ca", "--password-file", "/home/step/secrets/password", "/home/step/config/ca.json"]
    networks:
      - step-net
    healthcheck:
      test: ["CMD", "curl", "-sk", "https://localhost:9443/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ─── Step-CA UI (Go) ───────────────────────────────────────────────────────
  step-ui:
    privileged: true
    build:
      context: ./step-ui-go
      dockerfile: Dockerfile
    container_name: step-ui
    restart: unless-stopped
    ports:
      - "${UI_HTTPS_PORT:-443}:8443"
    volumes:
      - step-ui-certs:/opt/step-ui/certs
      - step-ui-ssl:/opt/step-ui/ssl
      - step-ui-data:/opt/step-ui/data
      - step-ca-data:/home/step:ro
    environment:
      TZ: "${TZ:-UTC}"
      DATABASE_URL: "postgres://stepui:${POSTGRES_PASSWORD:-stepui_secret}@postgres:5432/stepui?sslmode=disable"
      CA_URL:        "https://step-ca:9443"
      ROOT_CERT:     "/home/step/certs/root_ca.crt"
      PROVISIONER:   "${PROVISIONER:-admin}"
      PASSWORD_FILE: "/opt/step-ui/data/provisioner_password"
      PROVISIONER_PASSWORD: "${CA_PASSWORD:-change-me-min-8-chars}"
      SECRET_KEY:    "${SECRET_KEY:-change-me-to-a-long-random-string-at-least-32-chars}"
      SESSION_SECURE: "${SESSION_SECURE:-true}"
      HOST_IP:       "${HOST_IP:-127.0.0.1}"
      PORT:          "8443"
      STEPUI_ADMIN_PASSWORD: "${STEPUI_ADMIN_PASSWORD:-}"
    depends_on:
      postgres:
        condition: service_healthy
      step-ca:
        condition: service_healthy
    networks:
      - step-net
    healthcheck:
      test: ["CMD", "curl", "-sk", "-o", "/dev/null", "-w", "%{http_code}", "--max-time", "3", "https://localhost:8443/login"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
# ─── Volumes ───────────────────────────────────────────────────────────────
volumes:
  postgres-data:
  step-ca-data:
  step-ui-certs:
  step-ui-ssl:
  step-ui-data:

# ─── Networks ──────────────────────────────────────────────────────────────
networks:
  step-net:
    driver: bridge
    name: step-network
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: "true"
