{{define "forgot_password.html"}}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <title>Step-CA &middot; Forgot Password</title>
        <link rel="stylesheet" href="/static/css/pages.css">
    </head>
    <body>
        <div class="login-wrap">
            <div class="logo">
                <h1>&#x1F510; Step-CA</h1>
                <span>Password Recovery</span>
            </div>
            <div class="card">
                <h2>Forgot Password</h2>
                {{if .Error}}
                <div class="error">{{.Error}}</div>
                {{end}}
                {{if .Info}}
                <div class="info">{{.Info}}</div>
                {{else}}
                <form method="POST" action="/forgot-password">
                    <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
                    <div class="form-group">
                        <label>Username or Email</label>
                        <input type="text" name="identifier" required autofocus autocomplete="username">
                    </div>
                    <button class="btn" type="submit">Send Reset Link &rarr;</button>
                </form>
                {{end}}
                <div class="auth-footer">
                    <a class="auth-link" href="/login">&larr; Back to Sign In</a>
                </div>
            </div>
        </div>
    </body>
</html>
{{end}}
