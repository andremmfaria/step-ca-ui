{{define "content"}}
<div class="page-header">
    <div>
        <div class="breadcrumb">let's encrypt &middot; settings</div>
        <h1>Let's Encrypt Settings</h1>
    </div>
</div>
<div class="mw-600">
    <div class="card">
        <div class="card-header">
            <h3>General Settings</h3>
        </div>
        <div class="card-body">
            <form method="POST" action="/le/settings">
                <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
                <div class="form-full">
                    <label>Notification email</label>
                    <input type="email"
                           name="email"
                           placeholder="admin@example.com"
                           value="{{if .LESettings}}{{.LESettings.Email}}{{end}}">
                    <div class="muted-fs7-mt4">Let's Encrypt will send expiry notifications to this address</div>
                </div>
                <div class="form-full">
                    <label>Default provider</label>
                <select name="provider"
                        id="provSelect"
                        data-initial="{{if .LESettings}}{{.LESettings.Provider}}{{else}}http01{{end}}">
                    <option value="http01"
                            {{if eq .LESettings.Provider "http01"}}
                            selected
                            {{end}}>HTTP-01
                    </option>
                    <option value="cloudflare"
                            {{if eq .LESettings.Provider "cloudflare"}}
                            selected
                            {{end}}>DNS-01 &mdash; Cloudflare
                    </option>
                    <option value="route53"
                            {{if eq .LESettings.Provider "route53"}}
                            selected
                            {{end}}>DNS-01 &mdash; AWS Route53
                    </option>
                </select>
            </div>
            <!-- Cloudflare -->
            <div id="cfSettings" class="d-none">
                <hr class="hr-margin-12">
                <div class="fs11-accent-fw600">Cloudflare DNS</div>
                <div class="form-full">
                    <label>API Token</label>
                    <input type="password"
                           name="cf_token"
                           placeholder="Cloudflare API Token"
                           value="{{if .LESettings}}{{.LESettings.CFToken}}{{end}}">
                    <div class="muted-fs7-mt4">Permissions: Zone &mdash; DNS &mdash; Edit</div>
                </div>
                <div class="form-full">
                    <label>Zone ID (optional)</label>
                    <input type="text"
                           name="cf_zone_id"
                           placeholder="Cloudflare Zone ID"
                           value="{{if .LESettings}}{{.LESettings.CFZoneID}}{{end}}">
                </div>
            </div>
            <!-- Route53 -->
            <div id="r53Settings" class="d-none">
                <hr class="hr-margin-12">
                <div class="fs11-warn-fw600">AWS Route53</div>
                <div class="form-row">
                    <div>
                        <label>Access Key ID</label>
                        <input type="text"
                               name="r53_key_id"
                               placeholder="AKIAIOSFODNN7EXAMPLE"
                               value="{{if .LESettings}}{{.LESettings.R53KeyID}}{{end}}">
                    </div>
                    <div>
                        <label>Region</label>
                        <input type="text"
                               name="r53_region"
                               placeholder="us-east-1"
                               value="{{if .LESettings}}{{.LESettings.R53Region}}{{end}}">
                    </div>
                </div>
                <div class="form-full">
                    <label>Secret Access Key</label>
                    <input type="password"
                           name="r53_secret"
                           placeholder="AWS Secret Access Key"
                           value="{{if .LESettings}}{{.LESettings.R53SecretKey}}{{end}}">
                </div>
            </div>
            <button type="submit"
                    class="btn pad-mt8-10-22-fw6">Save Settings</button>
        </form>
    </div>
</div>
</div>
<script src="/static/js/pages/le-settings.js"></script>
{{end}}
