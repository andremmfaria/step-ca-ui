{{define "reset_password.html"}}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <title>Step-CA &middot; Reset Password</title>
        <link rel="stylesheet" href="/static/css/pages.css">
    </head>
    <body>
        <div class="login-wrap">
            <div class="logo">
                <h1>&#x1F510; Step-CA</h1>
                <span>Password Reset</span>
            </div>
            <div class="card">
                <h2>Set New Password</h2>
                {{if .Error}}
                <div class="error">{{.Error}}</div>
                {{end}}
                {{if .Token}}
                <form method="POST" action="/reset-password">
                    <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
                    <input type="hidden" name="token" value="{{.Token}}">
                    <div class="form-group">
                        <label>New Password</label>
                        <input type="password" name="new_password" required autofocus autocomplete="new-password">
                    </div>
                    <div class="form-group">
                        <label>Confirm New Password</label>
                        <input type="password" name="confirm_password" required autocomplete="new-password">
                    </div>
                    <button class="btn" type="submit">Set New Password &rarr;</button>
                </form>
                {{end}}
                <div class="auth-footer">
                    <a class="auth-link" href="/login">&larr; Back to Sign In</a>
                </div>
            </div>
        </div>
    </body>
</html>
{{end}}
