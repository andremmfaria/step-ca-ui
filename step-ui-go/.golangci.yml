version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - misspell
  exclusions:
    rules:
      # Suppress deprecated-symbol warnings on existing code in first-pass baseline
      - linters: [staticcheck]
        text: "SA1019:"
      # Suppress style/quickfix staticcheck hints in first-pass baseline
      - linters: [staticcheck]
        text: "^QF"
      - linters: [staticcheck]
        text: "ST1005:"
      - linters: [staticcheck]
        text: "S1039:"

formatters:
  enable:
    - gofmt

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
  # Allow existing issues in first pass — tighten after baseline
  new-from-rev: ""
