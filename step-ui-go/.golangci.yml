version: "2"

linters:
  default: none
  enable:
    # Original set (kept)
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - misspell
    # Added in PR-0
    - revive
    - gocritic
    - errorlint
    - bodyclose
    - noctx
    - gosec
    - unconvert
    - unparam

  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
      disabled-tags:
        - opinionated
        - experimental
    gosec:
      excludes:
        # errcheck already covers unchecked errors (G104)
        - G104

  exclusions:
    rules:
      # Suppress deprecated-symbol warnings on existing code — burn down in PR-23
      - linters: [staticcheck]
        text: "SA1019:"
      # Suppress style/quickfix staticcheck hints in existing code
      - linters: [staticcheck]
        text: "^QF"
      - linters: [staticcheck]
        text: "ST1005:"
      - linters: [staticcheck]
        text: "S1039:"

formatters:
  enable:
    - gofumpt

issues:
  # Ratchet: only report findings on code changed since the docs commit.
  # Legacy debt is burned down separately in PR-23.
  new-from-rev: a3ba460
  # Caps removed — the ratchet baseline handles scope.
