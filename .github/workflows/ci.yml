name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test-lint:
    name: Build / Test / Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: step-ui-go

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: step-ui-go/go.mod
          cache: true
          cache-dependency-path: step-ui-go/go.sum

      - name: Check gofmt
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "Files not formatted with gofmt:"
            echo "$UNFORMATTED"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Coverage gate
        # THRESHOLD=15 is the honest measured baseline set in PR-22 (15.4% total,
        # floored to 15).  Reaching 80% requires DI seams (a DB interface for
        # handlers/, an issuer interface for le/) — tracked as a follow-up wave.
        # The gate never regresses: each test PR must bump THRESHOLD to its new floor.
        run: THRESHOLD=15 bash scripts/coverage-gate.sh
        env:
          COVERPROFILE: coverage.out

      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: coverage-${{ github.run_id }}
          path: step-ui-go/coverage.out
          retention-days: 14

      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12.2
          working-directory: step-ui-go
          # Config file is step-ui-go/.golangci.yml — picked up automatically

  db-integration:
    name: DB Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: step-ui-go

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: stepui_test
          POSTGRES_PASSWORD: stepui_test
          POSTGRES_DB: stepui_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: step-ui-go/go.mod
          cache: true
          cache-dependency-path: step-ui-go/go.sum

      - name: Run integration tests
        run: go test -tags=integration -race -count=1 ./db/...
        env:
          INTEGRATION_DB_DSN: postgres://stepui_test:stepui_test@localhost:5432/stepui_test?sslmode=disable
          STEPUI_ADMIN_PASSWORD: IntegrationTest123!
