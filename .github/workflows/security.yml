name: Security Scanning

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly Sunday 04:23 UTC
    - cron: "23 4 * * 0"

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gosec:
    name: gosec
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: step-ui-go/go.mod
          cache: true
          cache-dependency-path: step-ui-go/go.sum

      - name: Run gosec
        # Non-failing on first pass — tighten after baseline triage.
        # Write SARIF to workspace-relative path so runner and upload step agree.
        uses: securego/gosec@4a3bd8af174872c778439083ded7adbf3747e770 # v2.26.1
        with:
          # Path is relative to the container workdir (/github/workspace); an absolute
          # host path like ${{ github.workspace }} does not exist inside the gosec container.
          args: -no-fail -fmt sarif -out gosec.sarif ./step-ui-go/...

      - name: Upload gosec SARIF
        if: ${{ hashFiles('gosec.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@03e4368ac7daa2bd82b3e85262f3bf87ee112f57 # v3.36.0
        with:
          sarif_file: gosec.sarif
          category: gosec

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: step-ui-go/go.mod
          cache: true
          cache-dependency-path: step-ui-go/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        # Non-failing on first pass — govulncheck has no native SARIF output yet;
        # text output captured; tighten exit-code after baseline triage.
        working-directory: step-ui-go
        run: govulncheck ./... || true

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Run gitleaks
        # Non-failing on first pass — tighten after baseline triage
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_SARIF: "true"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"
          # Set to 1 to make gitleaks block the build after baseline triage
          GITLEAKS_EXIT_CODE: "0"

  trivy-fs:
    name: trivy filesystem scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Trivy (filesystem)
        # Non-failing on first pass — tighten exit-code after baseline triage
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          exit-code: "0"

      - name: Upload Trivy fs SARIF
        if: ${{ hashFiles('trivy-fs.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@03e4368ac7daa2bd82b3e85262f3bf87ee112f57 # v3.36.0
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  trivy-image:
    name: trivy image scan
    runs-on: ubuntu-latest
    # Non-blocking: image build may be slow/fail in CI without push credentials.
    # Change to required once registry creds are wired up and baseline is clean.
    continue-on-error: true
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build Docker image
        run: docker build -t step-ca-ui:ci -f step-ui-go/Dockerfile step-ui-go

      - name: Run Trivy (image)
        # Non-failing on first pass — tighten exit-code after baseline triage
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: step-ca-ui:ci
          format: sarif
          output: trivy-image.sarif
          exit-code: "0"

      - name: Upload Trivy image SARIF
        if: ${{ hashFiles('trivy-image.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@03e4368ac7daa2bd82b3e85262f3bf87ee112f57 # v3.36.0
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
