name: Security Scanning

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly Sunday 04:23 UTC
    - cron: "23 4 * * 0"

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gosec:
    name: gosec
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: step-ui-go/go.mod
          cache: true
          cache-dependency-path: step-ui-go/go.sum

      - name: Run gosec
        # Non-failing on first pass — tighten after baseline triage
        uses: securego/gosec@1d909e2687abe43eaa81af88d6efde3d20c8d481 # v2.9.6
        with:
          args: -no-fail -fmt sarif -out /tmp/gosec.sarif ./step-ui-go/...

      - name: Upload gosec SARIF
        uses: github/codeql-action/upload-sarif@fca7ace96b7d713c7035871441bd52efbe39e27e # v3.28.19
        with:
          sarif_file: /tmp/gosec.sarif
          category: gosec

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: step-ui-go/go.mod
          cache: true
          cache-dependency-path: step-ui-go/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        # Non-failing on first pass — govulncheck has no native SARIF output yet;
        # text output captured; tighten exit-code after baseline triage.
        working-directory: step-ui-go
        run: govulncheck ./... || true

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Run gitleaks
        # Non-failing on first pass — tighten after baseline triage
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_SARIF: "true"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"
          # Set to 1 to make gitleaks block the build after baseline triage
          GITLEAKS_EXIT_CODE: "0"

  trivy-fs:
    name: trivy filesystem scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run Trivy (filesystem)
        # Non-failing on first pass — tighten exit-code after baseline triage
        uses: aquasecurity/trivy-action@1f0aa582c8c8f5f7639610d6d38baddfea4fdcee # v0.9.2
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          exit-code: "0"

      - name: Upload Trivy fs SARIF
        uses: github/codeql-action/upload-sarif@fca7ace96b7d713c7035871441bd52efbe39e27e # v3.28.19
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  trivy-image:
    name: trivy image scan
    runs-on: ubuntu-latest
    # Non-blocking: image build may be slow/fail in CI without push credentials.
    # Change to required once registry creds are wired up and baseline is clean.
    continue-on-error: true
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Build Docker image
        run: docker build -t step-ca-ui:ci -f step-ui-go/Dockerfile step-ui-go

      - name: Run Trivy (image)
        # Non-failing on first pass — tighten exit-code after baseline triage
        uses: aquasecurity/trivy-action@1f0aa582c8c8f5f7639610d6d38baddfea4fdcee # v0.9.2
        with:
          image-ref: step-ca-ui:ci
          format: sarif
          output: trivy-image.sarif
          exit-code: "0"

      - name: Upload Trivy image SARIF
        uses: github/codeql-action/upload-sarif@fca7ace96b7d713c7035871441bd52efbe39e27e # v3.28.19
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
