name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly Sunday 03:17 UTC — fixed time, not random
    - cron: "17 3 * * 0"

permissions:
  security-events: write
  actions: read
  contents: read

jobs:
  analyze:
    name: Analyze (Go)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: step-ui-go/go.mod
          cache: true
          cache-dependency-path: step-ui-go/go.sum

      - name: Initialize CodeQL
        uses: github/codeql-action/init@03e4368ac7daa2bd82b3e85262f3bf87ee112f57 # v3.36.0
        with:
          languages: go
          build-mode: manual

      # Manual build — module lives in step-ui-go/, not repo root
      - name: Build
        run: cd step-ui-go && go build ./...

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@03e4368ac7daa2bd82b3e85262f3bf87ee112f57 # v3.36.0
        with:
          category: /language:go
